name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2️⃣ Set up Node.js 20 with npm cache
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 3️⃣ Install project dependencies
      - name: Install Dependencies
        run: npm ci

      # 4️⃣ Install Playwright browsers (with OS dependencies)
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # 5️⃣ Run Playwright tests in parallel (4 workers) with retries on CI
      - name: Run Playwright Tests
        run: npx playwright test --workers=4 --reporter=html,junit

      # 6️⃣ Upload HTML report as artifact
      - name: Upload Playwright HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      # 7️⃣ Upload JUnit XML results (for GitHub test annotations or CI tools)
      - name: Upload JUnit Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: results.xml
          retention-days: 30